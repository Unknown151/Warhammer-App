<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Votann Led Units</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#D4A84B;--gold-bright:#F5D77A;--gold-dark:#8B6914;--bg:#0A0A0C;--bg2:#111116;--bg3:#18181E;--border:#2A2A35;--border-gold:#3D2E0A;--text:#E8E8EC;--text2:#9090A0;--text3:#606070;--red:#C94444;--blue:#4A8ED4;--green:#4AC978;--purple:#8B5CF6}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(212,168,75,0.3)}
        body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.4;padding-bottom:60px}
        .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1rem;position:sticky;top:0;z-index:100}
        .header-top{display:flex;align-items:center;gap:.6rem}
        .logo-title{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1rem;color:var(--gold);letter-spacing:.05em}
        .logo-sub{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3)}
        .army-stats{display:flex;gap:1rem}
        .stat-block{text-align:center}
        .stat-value{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold-bright)}
        .stat-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
        .det-btn{background:rgba(212,168,75,.15);padding:.4rem .7rem;border-radius:4px;border:1px solid var(--gold-dark);cursor:pointer;touch-action:manipulation;display:flex;align-items:center;gap:.4rem}
        .det-btn:hover{background:rgba(212,168,75,.25)}
        .det-btn-icon{font-size:.75rem}
        .det-btn-name{font-family:'Orbitron',sans-serif;font-size:.55rem;color:var(--gold);letter-spacing:.05em;white-space:nowrap}
        .container{padding:1rem}
        .section{margin-bottom:1.5rem}
        .section-header{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
        .section-icon{width:6px;height:6px;background:var(--gold);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
        .section-title{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:500;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}
        .section-count{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3);margin-left:auto}
        .unit-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1rem}
        .unit-card.attached{border-color:var(--gold-dark);box-shadow:inset 0 0 0 1px var(--border-gold)}
        .card-header{padding:.875rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(212,168,75,.05),transparent)}
        .unit-name{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:600;color:var(--text);letter-spacing:.03em}
        .unit-type{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}
        .unit-points{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--gold);background:rgba(212,168,75,.1);padding:.25rem .6rem;border-radius:3px;white-space:nowrap}
        .attached-banner{background:linear-gradient(90deg,var(--gold-dark),transparent);padding:.5rem 1rem;display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--border-gold)}
        .attached-icon{width:14px;height:14px;border:2px solid var(--gold);border-radius:50%;position:relative}
        .attached-icon::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--gold);border-radius:50%}
        .attached-text{font-size:.7rem;color:var(--gold-bright);text-transform:uppercase;letter-spacing:.1em}
        .leader-bonus{background:linear-gradient(90deg,rgba(74,201,120,.1),transparent);border-left:3px solid var(--green);padding:.625rem .875rem;margin:.75rem;border-radius:0 4px 4px 0}
        .bonus-label{font-size:.6rem;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem}
        .bonus-text{font-size:.8rem;color:var(--text);font-weight:500}
        .card-section{padding:.875rem 1rem;border-bottom:1px solid var(--border)}
        .card-section:last-child{border-bottom:none}
        .card-section.leader{background:linear-gradient(180deg,rgba(212,168,75,.03),transparent)}
        .sec-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.625rem;display:flex;align-items:center;gap:.4rem}
        .sec-label::before{content:'';width:10px;height:1px;background:var(--text3)}
        .sec-label .bodyguard-wipe-toggle{margin-left:auto}
        .stats-row{display:flex;gap:.35rem;margin-bottom:.875rem;flex-wrap:wrap}
        .stat{background:var(--bg2);padding:.35rem .5rem;border-radius:3px;text-align:center;min-width:42px;flex:1;max-width:60px;position:relative}
        .stat:not(:last-child)::after{content:'';position:absolute;right:-2px;top:15%;height:70%;width:1px;background:var(--gold-dark)}
        .stat-n{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
        .stat-v{font-family:'Share Tech Mono',monospace;font-size:.9rem;color:var(--text);font-weight:600}
        .stat.hl{background:rgba(212,168,75,.15);border:1px solid var(--border-gold)}
        .stat.hl .stat-v{color:var(--gold-bright)}
        .model-count{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text3);margin-bottom:.625rem}
        .model-count span{color:var(--text)}
        .invuln-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.875rem;padding:.4rem .6rem;background:rgba(212,168,75,.25);border:1px solid var(--border-gold);border-radius:3px;width:fit-content;cursor:pointer}
        .invuln-row.inherited{background:rgba(74,201,120,.25);border:2px dashed var(--green)}
        .invuln-label{font-size:.6rem;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
        .invuln-row.inherited .invuln-label{color:var(--text)}
        .invuln-val{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--text);font-weight:700}
        .invuln-row.inherited .invuln-val{color:var(--text)}
        .invuln-row.inherited::before{content:'';font-size:.7rem}
        .invuln-row.fnp-only{background:rgba(200,120,50,.25);border:1px solid rgba(200,120,50,.4)}
        .fnp-sep{color:var(--text3);font-size:.7rem;margin:0 .15rem}
        .fnp-label{font-size:.6rem;color:var(--text);text-transform:uppercase;letter-spacing:.05em;cursor:pointer}
        .fnp-val{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--text);font-weight:700;cursor:pointer}
        .weapons{margin-bottom:.875rem}
        .weapon-category{background:var(--bg2);border-radius:4px;margin-bottom:.5rem;overflow:hidden}
        .weapon-category:last-child{margin-bottom:0}
        .weapon-category-header{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
        .weapon-category.ranged .weapon-category-header{background:rgba(74,142,212,.2);color:var(--blue);border-left:3px solid var(--blue)}
        .weapon-category.melee .weapon-category-header{background:rgba(201,68,68,.2);color:var(--red);border-left:3px solid var(--red)}
        .weapon-category-content{padding:.25rem .5rem}
        .weapon{padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
        .weapon:last-child{border-bottom:none}
        .weapon-group{position:relative;margin:.5rem 0;padding-left:1rem;border-left:3px solid var(--text3)}
        .weapon-group::before{content:'';position:absolute;left:-3px;top:0;width:8px;height:3px;background:var(--text3)}
        .weapon-group::after{content:'';position:absolute;left:-3px;bottom:0;width:8px;height:3px;background:var(--text3)}
        .weapon-group .weapon{border-bottom:1px dashed rgba(255,255,255,.1)}
        .weapon-group .weapon:last-child{border-bottom:none}
        .weapon-group-label{font-size:.5rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem;font-style:italic}
        .weapon-header{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.4rem}
        .weapon-name{color:var(--text);font-weight:500;font-size:.8rem}
        .wtype{font-size:.5rem;padding:.12rem .3rem;border-radius:2px;text-transform:uppercase;font-weight:700}
        .wtype.r{background:rgba(74,142,212,.3);color:var(--blue)}
        .wtype.m{background:rgba(201,68,68,.3);color:var(--red)}
        .weapon-stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-top:.35rem}
        .weapon-stats-grid.ranged{grid-template-columns:45px repeat(5,1fr)}
        .ws{background:var(--bg2);padding:.25rem .2rem;border-radius:2px;text-align:center;position:relative}
        .ws:not(:last-child)::after{content:'';position:absolute;right:-2px;top:15%;height:70%;width:1px;background:var(--gold-dark)}
        .ws-label{font-size:.90rem;color:var(--text3);text-transform:uppercase;letter-spacing:.02em;display:block}
        .ws-val{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--text);font-weight:600}
        .wabs{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem}
        .wab{font-size:.55rem;padding:.25rem .5rem;background:rgba(139,92,246,.35);color:var(--text);border-radius:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;min-height:28px;display:inline-flex;align-items:center}
        .abilities{display:flex;flex-wrap:wrap;gap:.4rem}
        .ab{font-size:.65rem;padding:.5rem .7rem;background:rgba(139,92,246,.3);border:1px solid rgba(139,92,246,.4);color:var(--text);border-radius:3px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;user-select:none;touch-action:manipulation;min-height:36px;display:inline-flex;align-items:center}
        .ab.core{background:rgba(74,142,212,.3);border-color:rgba(74,142,212,.4);color:var(--text)}
        .ab.wg{background:rgba(212,168,75,.25);border-color:rgba(212,168,75,.4);color:var(--text)}
        .ab.inherited,.wab.inherited{background:rgba(74,201,120,.25);border:2px dashed var(--green);color:var(--text)}
        .ab.inherited::before,.wab.inherited::before{content:'🔗 '}
        .enh{display:inline-flex;align-items:center;gap:.3rem;font-size:.65rem;padding:.4rem .6rem;background:linear-gradient(90deg,rgba(212,168,75,.2),rgba(212,168,75,.1));border:1px solid var(--gold-dark);color:var(--gold-bright);border-radius:3px;margin-top:.5rem;cursor:pointer;touch-action:manipulation;min-height:36px}
        .enh::before{content:'★';font-size:.55rem}
        .total-wounds{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:rgba(74,201,120,.05);border-top:1px solid var(--border)}
        .tw-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
        .tw-val{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:var(--green);font-weight:600}
        .keywords{font-size:.6rem;color:var(--text3);padding:.625rem 1rem;background:var(--bg2);border-top:1px solid var(--border);line-height:1.5}
        #modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:none;justify-content:center;align-items:flex-end;padding:1rem}
        #modal.show{display:flex}
        .modal-content{background:var(--bg3);border:1px solid var(--border-gold);border-radius:12px 12px 0 0;width:100%;max-width:500px;max-height:70vh;overflow-y:auto}
        .modal-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg3)}
        .modal-title{font-family:'Orbitron',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.05em}
        .modal-close{width:44px;height:44px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
        .modal-body{padding:1rem}
        .modal-type{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
        .modal-desc{font-size:.9rem;color:var(--text);line-height:1.7}
        .modal-desc strong{color:var(--gold-bright)}
        footer{text-align:center;padding:1.5rem 1rem;color:var(--text3);font-size:.65rem;border-top:1px solid var(--border)}
        .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99}
        .tab{flex:1;padding:.875rem 1rem;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;text-align:center;cursor:pointer;border:none;background:transparent;transition:all .2s ease;touch-action:manipulation;position:relative}
        .tab:hover{color:var(--text2);background:rgba(212,168,75,.05)}
        .tab.active{color:var(--gold);background:rgba(212,168,75,.1)}
        .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .char-list{display:flex;flex-direction:column;gap:.75rem}
        .char-toggle{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;touch-action:manipulation;transition:all .2s ease}
        .char-toggle:hover{border-color:var(--gold-dark)}
        .char-toggle.dead{opacity:.6;border-color:var(--red);background:rgba(201,68,68,.05)}
        .char-toggle.dead .char-status{background:var(--red);border-color:var(--red)}
        .char-toggle.dead .char-status::after{opacity:1}
        .char-status{width:24px;height:24px;border:2px solid var(--gold);border-radius:50%;position:relative;flex-shrink:0;transition:all .2s ease}
        .char-status::after{content:'';position:absolute;top:50%;left:50%;width:60%;height:3px;background:#fff;transform:translate(-50%,-50%) rotate(-45deg);opacity:0;transition:opacity .2s ease}
        .char-info{flex:1}
        .char-name{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--text);letter-spacing:.03em}
        .char-unit{font-size:.65rem;color:var(--text3);margin-top:.15rem}
        .char-label{font-size:.6rem;padding:.2rem .5rem;border-radius:2px;text-transform:uppercase;letter-spacing:.05em}
        .char-label.alive{background:rgba(74,201,120,.2);color:var(--green)}
        .char-label.dead{background:rgba(201,68,68,.2);color:var(--red)}
        .unit-card.leader-dead .leader-bonus{display:none}
        .unit-card.leader-dead .card-section.leader{opacity:.4;position:relative}
        .unit-card.leader-dead .card-section.leader::after{content:'SLAIN';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--red);opacity:.5;letter-spacing:.2em;pointer-events:none}
        .unit-card.leader-dead .inherited{display:none}
        .unit-card.leader-dead .invuln-row.inherited{display:none}
        .unit-card.leader-dead .attached-banner{background:linear-gradient(90deg,rgba(201,68,68,.3),transparent);border-color:var(--red)}
        .unit-card.leader-dead .attached-icon{border-color:var(--red)}
        .unit-card.leader-dead .attached-icon::after{background:var(--red)}
        .unit-card.leader-dead .attached-text{color:var(--red)}
        .loading{text-align:center;padding:2rem;color:var(--text2)}
        .model-profile-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:.75rem 0 .4rem;border-bottom:1px dashed var(--border);padding-bottom:.3rem}
        .card-collapse-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:linear-gradient(90deg,rgba(212,168,75,.1),transparent);cursor:pointer;touch-action:manipulation;user-select:none}
        .card-collapse-header:hover{background:linear-gradient(90deg,rgba(212,168,75,.15),transparent)}
        .card-collapse-info{display:flex;flex-direction:column;gap:.15rem}
        .card-collapse-title{font-family:'Orbitron',sans-serif;font-size:.85rem;color:var(--gold);letter-spacing:.03em}
        .card-collapse-subtitle{font-size:.65rem;color:var(--text2)}
        .card-collapse-right{display:flex;align-items:center;gap:.5rem}
        .leader-death-toggle{width:28px;height:28px;border-radius:50%;border:2px solid var(--text3);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;transition:all .2s ease;font-size:.7rem;color:var(--text3)}
        .leader-death-toggle:hover{border-color:var(--red);color:var(--red)}
        .unit-card.leader-dead .leader-death-toggle{border-color:var(--red);background:var(--red);color:#fff}
        .bodyguard-wipe-toggle{display:inline-flex;align-items:center;gap:.3rem;font-size:.55rem;padding:.2rem .5rem;background:transparent;border:1px solid var(--text3);color:var(--text3);border-radius:3px;cursor:pointer;touch-action:manipulation;transition:all .2s ease;text-transform:uppercase;letter-spacing:.05em}
        .bodyguard-wipe-toggle:hover{border-color:var(--red);color:var(--red)}
        .unit-card.bodyguard-wiped .bodyguard-wipe-toggle{border-color:var(--red);background:rgba(201,68,68,.2);color:var(--red)}
        .unit-card.bodyguard-wiped .leader-bonus{display:none}
        .unit-card.bodyguard-wiped .card-section.leader .inherited{display:none}
        .unit-card.bodyguard-wiped .card-section:not(.leader){opacity:.4;position:relative}
        .unit-card.bodyguard-wiped .card-section:not(.leader)::after{content:'WIPED';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--red);opacity:.5;letter-spacing:.2em;pointer-events:none}
        .card-collapse-points{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--gold-bright)}
        .card-collapse-toggle{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:transform .2s ease}
        .card-collapse-toggle::after{content:'';border:solid var(--text2);border-width:0 2px 2px 0;padding:4px;transform:rotate(45deg);transition:transform .2s ease}
        .unit-card.collapsed .card-collapse-toggle::after{transform:rotate(-135deg)}
        .card-collapse-content{transition:all .2s ease}
        .unit-card.collapsed .card-collapse-content{display:none}
        .unit-card.collapsed{border-color:var(--border)}
        .unit-card.collapsed.attached{box-shadow:none}
        .buff-dropdown{position:relative;margin-left:auto}
        .buff-dropdown-btn{width:36px;height:36px;border:2px solid var(--border);border-radius:4px;background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;transition:all .2s ease;position:relative}
        .buff-dropdown-btn:hover{border-color:var(--gold-dark);background:var(--bg3)}
        .buff-dropdown-btn.has-active{border-color:var(--gold);background:rgba(212,168,75,.2)}
        .buff-dropdown-btn .btn-icon{font-size:.85rem;color:var(--text3);transition:color .2s ease}
        .buff-dropdown-btn.has-active .btn-icon{color:var(--gold)}
        .buff-badge{position:absolute;top:-5px;right:-5px;min-width:15px;height:15px;background:var(--gold);border-radius:8px;font-family:'Share Tech Mono',monospace;font-size:.5rem;color:var(--bg);display:none;align-items:center;justify-content:center;font-weight:700;padding:0 3px}
        .buff-dropdown-btn.has-active .buff-badge{display:flex}
        .buff-dropdown-menu{display:none;position:absolute;top:calc(100% + .5rem);right:0;background:var(--bg2);border:1px solid var(--border-gold);border-radius:6px;min-width:230px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.6);overflow:hidden}
        .buff-dropdown-menu.open{display:block}
        .buff-dropdown-item{display:flex;align-items:center;gap:.6rem;padding:.7rem .8rem;cursor:pointer;touch-action:manipulation;transition:background .15s ease;border-bottom:1px solid var(--border)}
        .buff-dropdown-item:last-child{border-bottom:none}
        .buff-dropdown-item:hover{background:rgba(212,168,75,.08)}
        .buff-dropdown-item.active{background:rgba(212,168,75,.12)}
        .buff-item-icon{font-size:.9rem;width:24px;text-align:center;flex-shrink:0;filter:grayscale(1) opacity(0.5)}
        .buff-dropdown-item.active .buff-item-icon{filter:none}
        .buff-item-label{flex:1;display:flex;flex-direction:column;gap:.1rem}
        .buff-item-name{font-family:'Orbitron',sans-serif;font-size:.6rem;color:var(--text2);letter-spacing:.03em}
        .buff-dropdown-item.active .buff-item-name{color:var(--gold)}
        .buff-item-desc{font-size:.55rem;color:var(--text3)}
        .buff-item-switch{width:34px;height:18px;border-radius:9px;background:var(--bg);border:1px solid var(--border);position:relative;flex-shrink:0;transition:all .2s ease}
        .buff-item-switch::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--text3);transition:all .2s ease}
        .buff-dropdown-item.active .buff-item-switch{background:rgba(212,168,75,.3);border-color:var(--gold)}
        .buff-dropdown-item.active .buff-item-switch::after{left:18px;background:var(--gold)}
        .stat-buffed{color:var(--green) !important}
        .wab.strat-buff{background:rgba(212,168,75,.35);border:1px solid var(--gold-dark)}
        .wab.strat-buff::before{content:'⚔ '}
        .wab.closest-buff{background:rgba(74,142,212,.35);border:1px solid rgba(74,142,212,.5)}

<body>

    <script>
// Global data stores
let abilities = {};
let enhancements = {};
let army = {};
let units = {};
const characterState = {};
const bodyguardState = {}; // Tracks if bodyguard unit is wiped (leader now solo)
const stratagemState = { fury: false, closest: false, sub1k: false };
let furyYP = false;
const collapsedCards = {};
const configExpandedCards = {};

// Army list - array of configured unit instances
let armyList = [];
// Structure: [{
//   instanceId: string,
//   unitId: string,
//   modelCount: number,
//   weapons: { weaponKey: { equipped: bool, count: number } },
//   leaderId: string | null,
//   enhancementId: string | null
// }]
let nextInstanceId = 1;

// All available unit IDs
const ALL_UNIT_IDS = [
    'kahl', 'einhyr-champion', 'uthar', 'iron-master', 'grimnyr', 'memnyr-strategist', 'arkanyst-evaluator', 'buri-aegnirssen',
    'einhyr-hearthguard', 'hearthkyn-warriors', 'thunderkyn', 'cthonian-beserks', 'cthonian-earthshakers',
    'hernkyn-pioneers', 'hernkyn-yaegirs', 'ironkin-steeljacks-heavy-volkanite', 'ironkin-steeljacks-melee',
    'hekaton-land-fortress', 'sagitaur', 'kapricus-carrier', 'kapricus-defenders'
];

// Unit type groupings for configuration display
const UNIT_GROUPS = {
    'Characters': ['kahl', 'einhyr-champion', 'uthar', 'iron-master', 'grimnyr', 'memnyr-strategist', 'arkanyst-evaluator', 'buri-aegnirssen'],
    'Infantry': ['einhyr-hearthguard', 'hearthkyn-warriors', 'thunderkyn', 'cthonian-beserks', 'cthonian-earthshakers', 'hernkyn-yaegirs', 'ironkin-steeljacks-heavy-volkanite', 'ironkin-steeljacks-melee'],
    'Vehicles & Mounted': ['hekaton-land-fortress', 'sagitaur', 'kapricus-carrier', 'kapricus-defenders', 'hernkyn-pioneers']
};

// DOM elements
const modal = document.getElementById('modal');
const mtitle = document.getElementById('mtitle');
const mtype = document.getElementById('mtype');
const mdesc = document.getElementById('mdesc');
const mclose = document.getElementById('mclose');

// Fetch JSON helper
async function fetchJSON(path) {
    const response = await fetch(path);
    if (!response.ok) throw new Error(`Failed to load ${path}`);
    return response.json();
}

// Save army list to localStorage
function saveArmyList() {
    localStorage.setItem('votann-army-list', JSON.stringify({ armyList, nextInstanceId }));
}

// Load army list from localStorage
function loadArmyList() {
    const saved = localStorage.getItem('votann-army-list');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            armyList = parsed.armyList || [];
            nextInstanceId = parsed.nextInstanceId || 1;
        } catch (e) {
            console.warn('Failed to parse saved army list:', e);
            armyList = [];
        }
    }
}

// Generate a unique key for a weapon
function generateWeaponKey(weapon) {
    const base = weapon.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    return weapon.model ? `${base}-${weapon.model.toLowerCase().replace(/[^a-z0-9]+/g, '-')}` : base;
}

// Get filtered weapons based on instance configuration
function getFilteredWeapons(unit, instanceWeapons) {
    if (!unit.weapons) return { ranged: [], melee: [] };

    const filterWeaponList = (list) => {
        return (list || [])
            .filter(w => {
                const key = generateWeaponKey(w);
                return instanceWeapons[key]?.equipped !== false;
            })
            .map(w => {
                const key = generateWeaponKey(w);
                const instConfig = instanceWeapons[key];
                if (instConfig && instConfig.count !== undefined) {
                    return { ...w, count: instConfig.count };
                }
                return w;
            });
    };

    return {
        ranged: filterWeaponList(unit.weapons.ranged),
        melee: filterWeaponList(unit.weapons.melee)
    };
}

// Create a new unit instance with default configuration
function createUnitInstance(unitId) {
    const unit = units[unitId];
    if (!unit) return null;

    const weapons = {};
    if (unit.weapons) {
        [...(unit.weapons.ranged || []), ...(unit.weapons.melee || [])].forEach(w => {
            const key = generateWeaponKey(w);
            weapons[key] = { equipped: true, count: w.count || 1 };
        });
    }

    // Use baseModels as default if available, otherwise models
    const defaultModelCount = unit.baseModels || unit.models || 1;

    return {
        instanceId: `inst-${nextInstanceId++}`,
        unitId: unitId,
        modelCount: defaultModelCount,
        weapons: weapons,
        leaderId: null,
        enhancementId: null
    };
}

// Add a unit to the army list
function addUnitToArmy(unitId) {
    const instance = createUnitInstance(unitId);
    if (instance) {
        armyList.push(instance);
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
    closeUnitPicker();
}

// Remove a unit instance from the army list
function removeUnitFromArmy(instanceId) {
    armyList = armyList.filter(inst => inst.instanceId !== instanceId);
    saveArmyList();
    renderConfigurationTab();
    renderUnits();
}

// Load all data
async function loadData() {
    try {
        // Load core data files
        [abilities, enhancements, army] = await Promise.all([
            fetchJSON('data/abilities.json'),
            fetchJSON('data/enhancements.json'),
            fetchJSON('data/army.json')
        ]);

        // Load ALL unit files (not just ledUnits)
        const unitPromises = ALL_UNIT_IDS.map(async id => {
            try {
                const unit = await fetchJSON(`data/units/${id}.json`);
                units[id] = unit;
            } catch (e) {
                console.warn(`Failed to load unit ${id}:`, e);
            }
        });
        await Promise.all(unitPromises);

        // Load saved army list from localStorage
        loadArmyList();

        // Render everything
        renderApp();
    } catch (error) {
        console.error('Failed to load data:', error);
        document.getElementById('units-container').innerHTML =
            `<div class="loading" style="color:var(--red)">Error loading data: ${error.message}</div>`;
    }
}

// Render the entire app
function renderApp() {
    // Update header
    document.getElementById('detachment-name').textContent =
        `${army.detachment.name}`;
    document.getElementById('detachment-banner').setAttribute('data-ab', army.detachment.rule);

    // Render units
    renderUnits();

    // Render configuration tab
    renderConfigurationTab();
}

// Render all unit cards
function renderUnits() {
    const scrollY = window.scrollY;
    const activeArmy = buildActiveArmy();
    const container = document.getElementById('units-container');

    // Render based on unit type
    container.innerHTML = activeArmy.map(entry => {
        if (entry.type === 'led') {
            return renderLedUnitCard(entry);
        } else {
            return renderSoloUnitCard(entry);
        }
    }).join('');

    document.getElementById('led-units-count').textContent = activeArmy.length;

    // Restore collapsed states
    Object.keys(collapsedCards).forEach(leaderId => {
        if (collapsedCards[leaderId]) {
            const card = container.querySelector(`.unit-card[data-leader="${leaderId}"]`);
            if (card) card.classList.add('collapsed');
        }
    });

    // Restore character dead states
    Object.keys(characterState).forEach(charId => {
        if (characterState[charId]) {
            updateUnitCard(charId, true);
        }
    });

    // Restore bodyguard wiped states
    Object.keys(bodyguardState).forEach(leaderId => {
        if (bodyguardState[leaderId]) {
            const card = container.querySelector(`.unit-card[data-leader="${leaderId}"]`);
            if (card) card.classList.add('bodyguard-wiped');
        }
    });

    // Restore scroll position
    window.scrollTo(0, scrollY);
}

// Render a solo unit card (no leader attached)
function renderSoloUnitCard(entry) {
    const unit = units[entry.unit];
    if (!unit) return '';

    const isLeader = entry.type === 'solo-leader';
    const instance = entry.instance;
    const modelCount = instance ? instance.modelCount : (unit.models || 1);
    const filteredWeapons = instance ? getFilteredWeapons(unit, instance.weapons) : unit.weapons;

    return `
        <div class="unit-card" data-unit="${entry.id}">
            <div class="card-collapse-header" onclick="toggleCardCollapse(this)">
                <div class="card-collapse-info">
                    <div class="card-collapse-title">${unit.name}</div>
                    <div class="card-collapse-subtitle">${modelCount} model${modelCount > 1 ? 's' : ''}</div>
                </div>
                <div class="card-collapse-right">
                    <div class="card-collapse-toggle"></div>
                </div>
            </div>
            <div class="card-collapse-content">
                <div class="card-section">
                    ${renderUnitHeader(unit, modelCount)}
                    ${renderUnitStats(unit)}
                    ${renderDefensiveRow(unit)}
                    ${renderWeapons(filteredWeapons, [], null, false, stratagemState.closest, {})}
                    ${renderSoloAbilities(unit)}
                </div>
                <div class="keywords">${(unit.keywords || []).join(', ')}</div>
            </div>
        </div>
    `;
}

// Render abilities for a solo unit
function renderSoloAbilities(unit) {
    let html = '<div class="abilities">';

    // Core abilities (exclude FNP - shown in defensive row)
    (unit.coreAbilities || []).forEach(ab => {
        if (ab.startsWith('feel-no-pain')) return;
        const abData = abilities[ab];
        html += `<span class="ab core tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Wargear abilities
    (unit.wargear || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab wg tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Regular abilities
    (unit.abilities || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    html += '</div>';
    return html;
}

// Render a single led unit card
function renderLedUnitCard(ledUnit) {
    const leader = units[ledUnit.leader];
    const bodyguard = units[ledUnit.bodyguard];
    const instance = ledUnit.instance;

    // Get bodyguard model count and weapons from instance
    const bodyguardModelCount = instance ? instance.modelCount : (bodyguard.models || 1);
    const bodyguardWeapons = instance ? getFilteredWeapons(bodyguard, instance.weapons) : bodyguard.weapons;

    // In 1K mode, suppress specific enhancements
    const sub1kRemovedEnhancements = ['ironskein', 'bastion-shield'];
    const enhancementId = ledUnit.enhancement;
    const suppressEnhancement = stratagemState.sub1k && sub1kRemovedEnhancements.includes(enhancementId);
    const enhancement = (enhancementId && !suppressEnhancement) ? enhancements[enhancementId] : null;

    // If Ironskein is suppressed, strip +wounds bonus from leader stats
    let leaderStats = leader;
    if (suppressEnhancement && enhancementId === 'ironskein' && leader.modelProfiles) {
        leaderStats = { ...leader, modelProfiles: leader.modelProfiles.map(p => ({
            ...p, stats: { ...p.stats, w: typeof p.stats.w === 'string' && p.stats.w.includes('+') ? parseInt(p.stats.w) : p.stats.w }
        }))};
    }

    // Check if Fury of the Hearth applies to this unit
    const furyActive = stratagemState.fury && isFuryTarget(ledUnit.leader, ledUnit.bodyguard);

    // Check closest-target bonuses
    const closestActive = stratagemState.closest;
    const closestBonuses = closestActive ? getClosestBonuses(ledUnit) : { apImprove: false, rerollHit: false };

    // Filter grantsAbilities to only weapon-applicable ones (exclude invuln, etc.)
    const nonWeaponAbilities = ['invuln-5'];
    const weaponGrantedAbilities = (leader.leaderBonus?.grantsAbilities || [])
        .filter(ab => !nonWeaponAbilities.includes(typeof ab === 'string' ? ab : ab.id));
    const leaderAppliesTo = leader.leaderBonus?.appliesTo || null;

    return `
        <div class="unit-card attached" data-leader="${ledUnit.leader}">
            <div class="card-collapse-header" onclick="toggleCardCollapse(this)">
                <div class="card-collapse-info">
                    <div class="card-collapse-title">${leader.name} + ${bodyguard.name}</div>
                    <div class="card-collapse-subtitle">${ledUnit.attachedBannerText}</div>
                </div>
                <div class="card-collapse-right">
                    <button class="leader-death-toggle" onclick="toggleLeaderDeath('${ledUnit.leader}', event)" title="Mark leader as slain">☠</button>
                    <div class="card-collapse-toggle"></div>
                </div>
            </div>
            <div class="card-collapse-content">
                <div class="attached-banner">
                    <div class="attached-icon"></div>
                    <div class="attached-text">${ledUnit.attachedBannerText}</div>
                </div>
                ${leader.leaderBonus ? `
                <div class="leader-bonus">
                    <div class="bonus-label">Leader Bonus</div>
                    <div class="bonus-text">${leader.leaderBonus.text}</div>
                </div>
                ` : ''}
                <div class="card-section leader">
                    <div class="sec-label">Leader</div>
                    ${renderUnitHeader(leader)}
                    ${renderUnitStats(leaderStats)}
                    ${renderDefensiveRow(leader)}
                    ${renderWeapons(leader.weapons, weaponGrantedAbilities, leaderAppliesTo, furyActive, closestActive, closestBonuses)}
                    ${renderAbilities(leader, enhancement)}
                </div>
                <div class="card-section">
                    <div class="sec-label"><span>Bodyguard</span><button class="bodyguard-wipe-toggle" onclick="toggleBodyguardWipe('${ledUnit.leader}', event)">☠ Wiped</button></div>
                    ${renderUnitHeader(bodyguard, bodyguardModelCount)}
                    ${renderUnitStats(bodyguard)}
                    ${renderBodyguardInvuln(bodyguard, leader)}
                    ${renderWeapons(bodyguardWeapons, weaponGrantedAbilities, leaderAppliesTo, furyActive, closestActive, closestBonuses)}
                    ${renderBodyguardAbilities(bodyguard, leader)}
                </div>
                <div class="keywords">${ledUnit.combinedKeywords.join(', ')}</div>
            </div>
        </div>
    `;
}

// Render unit header (name, type)
function renderUnitHeader(unit, modelCountOverride = null) {
    const modelCount = modelCountOverride !== null ? modelCountOverride : unit.models;
    const modelText = (modelCountOverride === null && unit.modelBreakdown)
        ? `${unit.models} (${unit.modelBreakdown})`
        : modelCount;

    return `
        <div style="margin-bottom:.5rem">
            <div class="unit-name">${unit.name}</div>
            <div class="unit-type">${unit.type.join(' • ')}</div>
        </div>
        <div class="model-count">Models: <span>${modelText}</span></div>
    `;
}

// Render unit stats
function renderUnitStats(unit) {
    // Check if unit has multiple model profiles
    if (unit.modelProfiles) {
        return unit.modelProfiles.map(profile => `
            <div class="model-profile-label">${profile.name}${profile.count > 1 ? ` (×${profile.count})` : ''}</div>
            ${renderStatsRow(profile.stats)}
        `).join('');
    }
    return renderStatsRow(unit.stats);
}

// Render a single stats row
function renderStatsRow(stats) {
    return `
        <div class="stats-row">
            <div class="stat"><div class="stat-n">M</div><div class="stat-v">${stats.m}</div></div>
            <div class="stat"><div class="stat-n">T</div><div class="stat-v">${stats.t}</div></div>
            <div class="stat"><div class="stat-n">Sv</div><div class="stat-v">${stats.sv}</div></div>
            <div class="stat hl"><div class="stat-n">W</div><div class="stat-v">${stats.w}</div></div>
            <div class="stat"><div class="stat-n">Ld</div><div class="stat-v">${stats.ld}</div></div>
            <div class="stat"><div class="stat-n">OC</div><div class="stat-v">${stats.oc}</div></div>
        </div>
    `;
}

// Get Feel No Pain ability from a unit's coreAbilities
function getUnitFnp(unit) {
    const fnpAbility = (unit.coreAbilities || []).find(ab => ab.startsWith('feel-no-pain'));
    if (!fnpAbility) return null;
    const abData = abilities[fnpAbility];
    return { id: fnpAbility, name: abData?.name || 'Feel No Pain' };
}

// Render invulnerable save (and optional FNP)
function renderInvuln(value, inherited, source = null, fnp = null) {
    const classes = inherited ? 'invuln-row inherited tappable' : 'invuln-row tappable';
    const dataAb = source ? `data-ab="${source}"` : '';
    const fnpHtml = fnp ? `<span class="fnp-sep">|</span><span class="fnp-label tappable" data-ab="${fnp.id}">FNP:</span><span class="fnp-val tappable" data-ab="${fnp.id}">${fnp.name.replace('Feel No Pain ', '')}</span>` : '';
    return `
        <div class="${classes}" ${dataAb}>
            <span class="invuln-label">Invulnerable Save:</span>
            <span class="invuln-val">${value}</span>
            ${fnpHtml}
        </div>
    `;
}

// Render standalone FNP row (when no invuln save)
function renderFnpRow(fnp) {
    if (!fnp) return '';
    return `
        <div class="invuln-row fnp-only tappable" data-ab="${fnp.id}">
            <span class="invuln-label">Feel No Pain:</span>
            <span class="invuln-val">${fnp.name.replace('Feel No Pain ', '')}</span>
        </div>
    `;
}

// Render defensive row (invuln + FNP combined)
function renderDefensiveRow(unit, inherited = false, source = null) {
    const fnp = getUnitFnp(unit);
    if (unit.invulnerableSave) {
        return renderInvuln(unit.invulnerableSave, inherited, source || unit.invulnerableSource, fnp);
    }
    if (fnp) {
        return renderFnpRow(fnp);
    }
    return '';
}

// Render bodyguard invuln (check for inherited from leader)
function renderBodyguardInvuln(bodyguard, leader) {
    const fnp = getUnitFnp(bodyguard);
    // Check if leader grants invuln
    const leaderGrantsInvuln = leader.leaderBonus?.grantsAbilities?.includes('invuln-5');

    if (leaderGrantsInvuln && !bodyguard.invulnerableSave) {
        return renderInvuln('5+', true, 'invuln-5', fnp);
    }

    if (bodyguard.invulnerableSave) {
        return renderInvuln(bodyguard.invulnerableSave, false, bodyguard.invulnerableSource, fnp);
    }

    if (fnp) {
        return renderFnpRow(fnp);
    }

    return '';
}

// Render weapons section
function renderWeapons(weapons, inheritedAbilities = [], appliesTo = null, furyActive = false, closestActive = false, closestBonuses = {}) {
    const rangedHtml = weapons.ranged?.length ? renderWeaponCategory('ranged', weapons.ranged, inheritedAbilities, appliesTo, furyActive, closestActive, closestBonuses) : '';
    const meleeHtml = weapons.melee?.length ? renderWeaponCategory('melee', weapons.melee, inheritedAbilities, appliesTo, false, closestActive, closestBonuses) : ''; // Fury only affects ranged

    return `<div class="weapons">${rangedHtml}${meleeHtml}</div>`;
}

// Render a weapon category (ranged or melee)
function renderWeaponCategory(type, weaponList, inheritedAbilities, appliesTo, furyActive = false, closestActive = false, closestBonuses = {}) {
    const label = type === 'ranged' ? 'Ranged Weapons' : 'Melee Weapons';

    // Group weapons by weaponGroup
    const groups = {};
    const ungrouped = [];

    weaponList.forEach(weapon => {
        if (weapon.weaponGroup) {
            if (!groups[weapon.weaponGroup]) {
                groups[weapon.weaponGroup] = { label: weapon.weaponGroupLabel, weapons: [] };
            }
            groups[weapon.weaponGroup].weapons.push(weapon);
        } else {
            ungrouped.push(weapon);
        }
    });

    let contentHtml = '';

    // Render ungrouped weapons
    ungrouped.forEach(weapon => {
        contentHtml += renderWeapon(weapon, type, inheritedAbilities, appliesTo, furyActive, closestActive, closestBonuses);
    });

    // Render grouped weapons
    Object.values(groups).forEach(group => {
        contentHtml += `
            <div class="weapon-group">
                <div class="weapon-group-label">${group.label}</div>
                ${group.weapons.map(w => renderWeapon(w, type, inheritedAbilities, appliesTo, furyActive, closestActive, closestBonuses)).join('')}
            </div>
        `;
    });

    return `
        <div class="weapon-category ${type}">
            <div class="weapon-category-header">${label}</div>
            <div class="weapon-category-content">${contentHtml}</div>
        </div>
    `;
}

// Helper to parse ability (supports string or {id, display} object)
function parseAbility(ab) {
    if (typeof ab === 'string') {
        return { id: ab, display: null };
    }
    return { id: ab.id, display: ab.display || null };
}

// Render a single weapon
function renderWeapon(weapon, type, inheritedAbilities, appliesTo, furyActive = false, closestActive = false, closestBonuses = {}) {
    const countText = weapon.count > 1 ? ` (×${weapon.count})` : '';
    const modelText = weapon.model ? ` (${weapon.model})` : '';
    const nameDisplay = weapon.name + countText + modelText;

    // Determine which inherited abilities apply
    let applicableInherited = [];
    if (appliesTo === null || appliesTo === type) {
        // Check weapon's own inherited abilities first
        applicableInherited = [...(weapon.inheritedAbilities || [])];
        // Then add global inherited abilities if not already present
        inheritedAbilities.forEach(ab => {
            const parsed = parseAbility(ab);
            if (!applicableInherited.some(a => parseAbility(a).id === parsed.id)) {
                applicableInherited.push(ab);
            }
        });
    } else {
        // Only use weapon's own inherited abilities
        applicableInherited = [...(weapon.inheritedAbilities || [])];
    }

    // Apply Fury of the Hearth buff (only for ranged weapons)
    const strengthDisplay = furyActive && type === 'ranged'
        ? `<span class="stat-buffed">${parseInt(weapon.s) + 1}</span>`
        : weapon.s;

    // Apply AP improvement from Prioritised Efficiency (closest target)
    const apDisplay = closestActive && closestBonuses.apImprove
        ? `<span class="ap-buffed">${improveAP(weapon.ap)}</span>`
        : weapon.ap;

    const statsGrid = type === 'ranged'
        ? `<div class="weapon-stats-grid ranged">
            <div class="ws"><span class="ws-label">Rng</span><span class="ws-val">${weapon.range}</span></div>
            <div class="ws"><span class="ws-label">A</span><span class="ws-val">${weapon.a}</span></div>
            <div class="ws"><span class="ws-label">BS</span><span class="ws-val">${weapon.bs}</span></div>
            <div class="ws"><span class="ws-label">S</span><span class="ws-val">${strengthDisplay}</span></div>
            <div class="ws"><span class="ws-label">AP</span><span class="ws-val">${apDisplay}</span></div>
            <div class="ws"><span class="ws-label">D</span><span class="ws-val">${weapon.d}</span></div>
           </div>`
        : `<div class="weapon-stats-grid">
            <div class="ws"><span class="ws-label">A</span><span class="ws-val">${weapon.a}</span></div>
            <div class="ws"><span class="ws-label">WS</span><span class="ws-val">${weapon.ws}</span></div>
            <div class="ws"><span class="ws-label">S</span><span class="ws-val">${weapon.s}</span></div>
            <div class="ws"><span class="ws-label">AP</span><span class="ws-val">${apDisplay}</span></div>
            <div class="ws"><span class="ws-label">D</span><span class="ws-val">${weapon.d}</span></div>
           </div>`;

    // Render weapon abilities
    const allAbilities = [
        ...(weapon.abilities || []).map(ab => ({ ...parseAbility(ab), inherited: false, stratBuff: false, closestBuff: false })),
        ...applicableInherited.map(ab => ({ ...parseAbility(ab), inherited: true, stratBuff: false, closestBuff: false }))
    ];

    // Add Sustained Hits 1 from Fury of the Hearth (only for ranged weapons, only if YP was paid)
    if (furyActive && furyYP && type === 'ranged') {
        allAbilities.push({ id: 'sustained-hits', display: 'Sustained Hits 1', inherited: false, stratBuff: true, closestBuff: false });
    }

    // Add closest-target reminders
    if (closestActive) {
        // Re-roll Wound 1 (all units, all weapons) from Prioritised Efficiency
        allAbilities.push({ id: 'prioritised-efficiency', display: 'Re-roll Wound 1', inherited: false, stratBuff: false, closestBuff: true });
        // Re-roll Hit 1 (Hearthguard led units, ranged only) from Decisive Destruction
        if (closestBonuses.rerollHit && type === 'ranged') {
            allAbilities.push({ id: 'decisive-destruction', display: 'Re-roll Hit 1', inherited: false, stratBuff: false, closestBuff: true });
        }
    }

    const abilitiesHtml = allAbilities.length ? `
        <div class="wabs">
            ${allAbilities.map(ab => {
                const abData = abilities[ab.id];
                const displayName = ab.display || abData?.name || ab.id;
                let classes = ab.inherited ? 'wab inherited tappable' : 'wab tappable';
                if (ab.stratBuff) classes = 'wab strat-buff tappable';
                if (ab.closestBuff) classes = 'wab closest-buff tappable';
                return `<button class="${classes}" data-ab="${ab.id}">${displayName}</button>`;
            }).join('')}
        </div>
    ` : '';

    return `
        <div class="weapon">
            <div class="weapon-header"><span class="weapon-name">${nameDisplay}</span></div>
            ${statsGrid}
            ${abilitiesHtml}
        </div>
    `;
}

// Render leader abilities
function renderAbilities(unit, enhancement) {
    let html = '<div class="abilities">';

    // Wargear abilities
    (unit.wargear || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab wg tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Regular abilities
    (unit.abilities || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    html += '</div>';

    // Enhancement
    if (enhancement) {
        const enhKey = Object.keys(enhancements).find(k => enhancements[k] === enhancement);
        html += `<div class="enh tappable" data-ab="${enhKey}">${enhancement.name}</div>`;
    }

    return html;
}

// Render bodyguard abilities (with inherited)
function renderBodyguardAbilities(bodyguard, leader) {
    let html = '<div class="abilities">';

    // Core abilities (exclude FNP - shown in defensive row)
    (bodyguard.coreAbilities || []).forEach(ab => {
        if (ab.startsWith('feel-no-pain')) return;
        const abData = abilities[ab];
        html += `<span class="ab core tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Wargear abilities
    (bodyguard.wargear || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab wg tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Regular abilities
    (bodyguard.abilities || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    html += '</div>';

}

// Render configuration tab (army list)
function renderConfigurationTab() {
    const container = document.getElementById('army-list-container');

    if (armyList.length === 0) {
        container.innerHTML = '<div class="army-list-empty">No units added. Tap + to add units.</div>';
    } else {
        container.innerHTML = armyList.map(inst => renderArmyInstance(inst)).join('');
    }

    updateConfigPoints();
}

// Render a single army instance card
function renderArmyInstance(instance) {
    const unit = units[instance.unitId];
    if (!unit) return '';

    const isExpanded = configExpandedCards[instance.instanceId];
    const isLeader = unit.isLeader;
    const canBeLeadBy = unit.canBeLeadBy || [];

    // Calculate instance points
    const instancePoints = calculateInstancePoints(instance);

    // Build details string
    const weaponDetails = getWeaponSummary(instance);

    let bodyContent = '';

    // Model count - use baseModels as min and maxModels as max if available
    const minModels = unit.baseModels || 1;
    const maxModels = unit.maxModels || unit.models || 20;
    bodyContent += `
        <div class="model-count-row">
            <span class="model-count-label">Models:</span>
            <button class="weapon-count-btn" onclick="event.preventDefault();adjustModelCount('${instance.instanceId}',-1,${minModels},${maxModels})">−</button>
            <span class="weapon-count-display">${instance.modelCount}</span>
            <button class="weapon-count-btn" onclick="event.preventDefault();adjustModelCount('${instance.instanceId}',1,${minModels},${maxModels})">+</button>
        </div>
    `;

    // Leader assignment dropdown (for non-leader units that can be led)
    if (!isLeader && canBeLeadBy.length > 0) {
        bodyContent += renderInstanceLeaderSelector(instance, canBeLeadBy);
    }

    // Enhancement selector (for leader units)
    if (isLeader) {
        bodyContent += renderInstanceEnhancementSelector(instance);
    }

    // Weapons section
    bodyContent += renderInstanceWeaponSelector(instance);

    return `
        <div class="army-instance ${isExpanded ? 'expanded' : ''}" data-instance="${instance.instanceId}">
            <div class="army-instance-header" onclick="toggleInstanceCard('${instance.instanceId}')">
                <div class="army-instance-info">
                    <div class="army-instance-name">${unit.name}</div>
                    <div class="army-instance-details">${instance.modelCount}x ${unit.name} • ${weaponDetails}</div>
                </div>
                <div class="army-instance-points">${instancePoints} pts</div>
                <button class="army-instance-delete" onclick="removeUnitFromArmy('${instance.instanceId}'); event.stopPropagation();">✕</button>
                <div class="army-instance-expand"></div>
            </div>
            <div class="army-instance-body">
                ${bodyContent}
            </div>
        </div>
    `;
}

// Get weapon summary for instance details
function getWeaponSummary(instance) {
    const weapons = [];
    Object.entries(instance.weapons).forEach(([key, config]) => {
        if (config.equipped && config.count > 0) {
            // Find weapon name from key
            const unit = units[instance.unitId];
            let weaponName = key;
            if (unit?.weapons) {
                const allWeapons = [...(unit.weapons.ranged || []), ...(unit.weapons.melee || [])];
                const found = allWeapons.find(w => generateWeaponKey(w) === key);
                if (found) weaponName = found.name;
            }
            weapons.push(`${config.count}x ${weaponName}`);
        }
    });
    return weapons.slice(0, 2).join(', ') + (weapons.length > 2 ? '...' : '') || 'No weapons';
}

// Calculate points for an instance
function calculateInstancePoints(instance) {
    const unit = units[instance.unitId];
    if (!unit) return 0;

    // Tier-based points: if unit has baseModels and modelCount exceeds it, double the points
    let points = unit.points || 0;
    if (unit.baseModels && instance.modelCount > unit.baseModels) {
        points = points * 2;
    }

    // Add leader points if attached
    if (instance.leaderId && units[instance.leaderId]) {
        points += units[instance.leaderId].points || 0;
    }

    // Add enhancement points
    if (instance.enhancementId && enhancements[instance.enhancementId]) {
        points += enhancements[instance.enhancementId].points || 0;
    }

    return points;
}

// Render leader selector for an instance
function renderInstanceLeaderSelector(instance, canBeLeadBy) {
    const currentLeader = instance.leaderId || '';

    let options = '<option value="">-- No Leader --</option>';
    canBeLeadBy.forEach(leaderId => {
        const leader = units[leaderId];
        if (!leader) return;
        options += `<option value="${leaderId}" ${currentLeader === leaderId ? 'selected' : ''}>${leader.name} (+${leader.points} pts)</option>`;
    });

    let preview = '';
    if (currentLeader && units[currentLeader]?.leaderBonus) {
        const leader = units[currentLeader];
        preview = `
            <div class="leader-bonus-preview">
                <div class="preview-label">Leader Bonus</div>
                <div class="preview-text">${leader.leaderBonus.text}</div>
            </div>
        `;
    }

    return `
        <div class="config-label">Assigned Leader</div>
        <select class="leader-select" onchange="setInstanceLeader('${instance.instanceId}', this.value)">
            ${options}
        </select>
        ${preview}
    `;
}

// Render enhancement selector for an instance
function renderInstanceEnhancementSelector(instance) {
    const currentEnh = instance.enhancementId || '';
    const unit = units[instance.unitId];

    let options = '<option value="">-- No Enhancement --</option>';
    Object.entries(enhancements).forEach(([enhId, enh]) => {
        const restriction = enh.restriction || '';
        const canUse = restriction === 'Leagues of Votann only' ||
            restriction.toLowerCase().includes(unit.name.toLowerCase()) ||
            (unit.keywords?.includes('KÂHL') && restriction.includes('Kâhl'));

        if (canUse) {
            options += `<option value="${enhId}" ${currentEnh === enhId ? 'selected' : ''}>${enh.name} (+${enh.points} pts)</option>`;
        }
    });

    return `
        <div class="config-label">Enhancement</div>
        <select class="enhancement-select" onchange="setInstanceEnhancement('${instance.instanceId}', this.value)">
            ${options}
        </select>
    `;
}

// Render weapon selector for an instance
function renderInstanceWeaponSelector(instance) {
    const unit = units[instance.unitId];
    if (!unit?.weapons) return '';

    let html = '';

    const renderWeaponRow = (w) => {
        const key = generateWeaponKey(w);
        const config = instance.weapons[key] || { equipped: true, count: w.count || 1 };
        return `
            <label class="weapon-checkbox">
                <input type="checkbox" ${config.equipped ? 'checked' : ''} onchange="setInstanceWeaponEquipped('${instance.instanceId}', '${key}', this.checked)">
                <span class="weapon-checkbox-name">${w.name}</span>
                <button class="weapon-count-btn" onclick="event.preventDefault();event.stopPropagation();adjustWeaponCount('${instance.instanceId}','${key}',-1)">−</button>
                <span class="weapon-count-display">${config.count}</span>
                <button class="weapon-count-btn" onclick="event.preventDefault();event.stopPropagation();adjustWeaponCount('${instance.instanceId}','${key}',1)">+</button>
            </label>
        `;
    };

    // Ranged weapons
    if (unit.weapons.ranged?.length > 0) {
        html += '<div class="config-label">Ranged Weapons</div>';
        unit.weapons.ranged.forEach(w => { html += renderWeaponRow(w); });
    }

    // Melee weapons
    if (unit.weapons.melee?.length > 0) {
        html += '<div class="config-label">Melee Weapons</div>';
        unit.weapons.melee.forEach(w => { html += renderWeaponRow(w); });
    }

    return html;
}

// Toggle instance card expansion
function toggleInstanceCard(instanceId) {
    configExpandedCards[instanceId] = !configExpandedCards[instanceId];
    const card = document.querySelector(`.army-instance[data-instance="${instanceId}"]`);
    if (card) {
        card.classList.toggle('expanded', configExpandedCards[instanceId]);
    }
}

// Set instance model count
function setInstanceModelCount(instanceId, count) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        instance.modelCount = Math.max(1, parseInt(count) || 1);
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Adjust model count by delta (+1 or -1) with min/max constraints
function adjustModelCount(instanceId, delta, min, max) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        const newCount = Math.min(max, Math.max(min, instance.modelCount + delta));
        instance.modelCount = newCount;
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Set instance weapon equipped state
function setInstanceWeaponEquipped(instanceId, weaponKey, equipped) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        if (!instance.weapons[weaponKey]) instance.weapons[weaponKey] = { equipped: true, count: 1 };
        instance.weapons[weaponKey].equipped = equipped;
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Set instance weapon count
function setInstanceWeaponCount(instanceId, weaponKey, count) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        if (!instance.weapons[weaponKey]) instance.weapons[weaponKey] = { equipped: true, count: 1 };
        instance.weapons[weaponKey].count = parseInt(count) || 0;
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Adjust weapon count by delta (+1 or -1)
function adjustWeaponCount(instanceId, weaponKey, delta) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        if (!instance.weapons[weaponKey]) instance.weapons[weaponKey] = { equipped: true, count: 1 };
        const newCount = Math.max(0, instance.weapons[weaponKey].count + delta);
        instance.weapons[weaponKey].count = newCount;
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Set instance leader
function setInstanceLeader(instanceId, leaderId) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        instance.leaderId = leaderId || null;
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Set instance enhancement
function setInstanceEnhancement(instanceId, enhancementId) {
    const instance = armyList.find(i => i.instanceId === instanceId);
    if (instance) {
        instance.enhancementId = enhancementId || null;
        saveArmyList();
        renderConfigurationTab();
        renderUnits();
    }
}

// Update total points display
function updateConfigPoints() {
    let total = 0;
    armyList.forEach(instance => {
        total += calculateInstancePoints(instance);
    });
    document.getElementById('config-points').textContent = total;
}

// Unit picker functions
function openUnitPicker() {
    const picker = document.getElementById('unit-picker');
    const content = document.getElementById('unit-picker-content');

    let html = '';
    Object.entries(UNIT_GROUPS).forEach(([groupName, unitIds]) => {
        const validUnits = unitIds.filter(id => units[id]);
        if (validUnits.length === 0) return;

        html += `<div class="unit-picker-section">
            <div class="unit-picker-section-title">${groupName}</div>
            ${validUnits.map(id => {
                const unit = units[id];
                return `<div class="unit-picker-item" onclick="addUnitToArmy('${id}')">
                    <span class="unit-picker-item-name">${unit.name}</span>
                    <span class="unit-picker-item-pts">${unit.points} pts</span>
                </div>`;
            }).join('')}
        </div>`;
    });

    content.innerHTML = html;
    picker.classList.add('open');
}

function closeUnitPicker() {
    document.getElementById('unit-picker').classList.remove('open');
}

// Build active army from army list
function buildActiveArmy() {
    const activeUnits = [];

    armyList.forEach(instance => {
        const unit = units[instance.unitId];
        if (!unit) return;

        // If it has an assigned leader, render as led unit
        if (instance.leaderId && units[instance.leaderId]) {
            const leader = units[instance.leaderId];
            activeUnits.push({
                id: instance.instanceId,
                type: 'led',
                leader: instance.leaderId,
                bodyguard: instance.unitId,
                enhancement: instance.enhancementId,
                attachedBannerText: 'Attached',
                combinedKeywords: [...new Set([...(leader.keywords || []), ...(unit.keywords || [])])],
                instance: instance
            });
        } else {
            // Standalone unit
            activeUnits.push({
                id: instance.instanceId,
                type: unit.isLeader ? 'solo-leader' : 'solo',
                unit: instance.unitId,
                instance: instance
            });
        }
    });

    // Sort alphabetically by unit name
    activeUnits.sort((a, b) => {
        const nameA = a.type === 'led' ? units[a.leader]?.name : units[a.unit]?.name;
        const nameB = b.type === 'led' ? units[b.leader]?.name : units[b.unit]?.name;
        return (nameA || '').localeCompare(nameB || '');
    });

    return activeUnits;
}

// Update unit card when leader dies
function updateUnitCard(charId, isDead) {
    const unitCard = document.querySelector(`.unit-card[data-leader="${charId}"]`);
    if (unitCard) {
        if (isDead) {
            unitCard.classList.add('leader-dead');
        } else {
            unitCard.classList.remove('leader-dead');
        }
    }
}

// Toggle card collapse
function toggleCardCollapse(header) {
    const card = header.closest('.unit-card');
    card.classList.toggle('collapsed');
    const leaderId = card.getAttribute('data-leader');
    collapsedCards[leaderId] = card.classList.contains('collapsed');
}

// Toggle leader death from unit card
function toggleLeaderDeath(leaderId, e) {
    e.stopPropagation();
    characterState[leaderId] = !characterState[leaderId];
    const isDead = characterState[leaderId];

    // Update unit card
    updateUnitCard(leaderId, isDead);
}

// Toggle bodyguard wipe (leader now solo, loses "while leading" abilities)
function toggleBodyguardWipe(leaderId, e) {
    e.stopPropagation();
    bodyguardState[leaderId] = !bodyguardState[leaderId];
    const isWiped = bodyguardState[leaderId];

    // Update unit card
    const unitCard = document.querySelector(`.unit-card[data-leader="${leaderId}"]`);
    if (unitCard) {
        if (isWiped) {
            unitCard.classList.add('bodyguard-wiped');
        } else {
            unitCard.classList.remove('bodyguard-wiped');
        }
    }
}

// Buff dropdown
function toggleBuffDropdown(e) {
    e.stopPropagation();
    document.getElementById('buff-menu').classList.toggle('open');
}

function closeBuffDropdown() {
    document.getElementById('buff-menu').classList.remove('open');
}

function updateBuffButton() {
    const activeCount = Object.values(stratagemState).filter(Boolean).length;
    const btn = document.querySelector('.buff-dropdown-btn');
    const badge = document.getElementById('buff-badge');
    if (activeCount > 0) {
        btn.classList.add('has-active');
        badge.textContent = activeCount;
    } else {
        btn.classList.remove('has-active');
    }
}

function showFuryPrompt() {
    const overlay = document.createElement('div');
    overlay.className = 'fury-prompt';
    overlay.innerHTML = `
        <div class="fury-prompt-box">
            <div class="fury-prompt-text">Do you pay <strong>1 Yield Point</strong>, to get <strong>Sustained Hits 1</strong>?</div>
            <div class="fury-prompt-buttons">
                <button class="fury-prompt-btn yes" onclick="resolveFuryYP(true)">Yes</button>
                <button class="fury-prompt-btn no" onclick="resolveFuryYP(false)">No</button>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);
}

function resolveFuryYP(paid) {
    furyYP = paid;
    const overlay = document.querySelector('.fury-prompt');
    if (overlay) overlay.remove();
    renderUnits();
}

function toggleStratagemItem(stratId, e) {
    e.stopPropagation();
    stratagemState[stratId] = !stratagemState[stratId];

    // Update dropdown item visual
    const item = document.querySelector(`.buff-dropdown-item[data-strat="${stratId}"]`);
    item.classList.toggle('active', stratagemState[stratId]);

    // Update badge
    updateBuffButton();

    // Show YP prompt when Fury is toggled ON, reset when toggled OFF
    if (stratId === 'fury') {
        if (stratagemState.fury) {
            showFuryPrompt();
        } else {
            furyYP = false;
        }
    }

    // Re-render units to apply effects
    renderUnits();
    if (stratId === 'sub1k') {
        renderCharacterToggles();
    }
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.buff-dropdown')) {
        closeBuffDropdown();
    }
});

// Check if Fury of the Hearth applies to a unit
function isFuryTarget(leaderId, bodyguardId) {
    // Fury of the Hearth applies to Hearthguard units and their leaders
    return bodyguardId === 'einhyr-hearthguard';
}

// Get closest-target bonuses for a led unit
function getClosestBonuses(ledUnit) {
    const keywords = ledUnit.combinedKeywords || [];
    // Prioritised Efficiency: AP improve for KÂHL, EINHYR HEARTHGUARD, or ÛTHAR THE DESTINED units
    const apImprove = keywords.some(k =>
        ['KÂHL', 'EINHYR HEARTHGUARD', 'ÛTHAR THE DESTINED'].includes(k)
    );
    // Decisive Destruction: re-roll hit 1 on ranged (Hearthguard unit ability, applies to whole led unit)
    const rerollHit = (ledUnit.bodyguard === 'einhyr-hearthguard');
    return { apImprove, rerollHit };
}

// Improve AP by 1 (e.g. "0" → "-1", "-1" → "-2")
function improveAP(apStr) {
    const num = parseInt(apStr);
    return `${num - 1}`;
}

// Modal functions
function showModal(id) {
    // Check abilities first, then enhancements
    const a = abilities[id] || enhancements[id];
    if (!a) return;
    mtitle.textContent = a.name;
    mtype.textContent = a.type;
    mdesc.innerHTML = a.description;
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
}

function hideModal() {
    modal.classList.remove('show');
    document.body.style.overflow = '';
}

// Event listeners
document.addEventListener('click', function(e) {
    const target = e.target.closest('[data-ab]');
    if (target) {
        e.preventDefault();
        showModal(target.getAttribute('data-ab'));
    }
});

mclose.addEventListener('click', hideModal);
modal.addEventListener('click', function(e) {
    if (e.target === modal) hideModal();
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideModal();
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
        const tabId = this.getAttribute('data-tab');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
    });
});

// Initialize app
loadData();
