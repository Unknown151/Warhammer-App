<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Votann Led Units</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#D4A84B;--gold-bright:#F5D77A;--gold-dark:#8B6914;--bg:#0A0A0C;--bg2:#111116;--bg3:#18181E;--border:#2A2A35;--border-gold:#3D2E0A;--text:#E8E8EC;--text2:#9090A0;--text3:#606070;--red:#C94444;--blue:#4A8ED4;--green:#4AC978;--purple:#8B5CF6}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:rgba(212,168,75,0.3)}
        body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.4;padding-bottom:60px}
        .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem;position:sticky;top:0;z-index:100}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
        .logo-title{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1rem;color:var(--gold);letter-spacing:.05em}
        .logo-sub{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3)}
        .army-stats{display:flex;gap:1rem}
        .stat-block{text-align:center}
        .stat-value{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold-bright)}
        .stat-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
        .det-banner{background:linear-gradient(90deg,rgba(212,168,75,.15),transparent);padding:.5rem .75rem;border-radius:4px;border-left:3px solid var(--gold);cursor:pointer;touch-action:manipulation}
        .det-name{font-family:'Orbitron',sans-serif;font-size:.7rem;color:var(--gold);letter-spacing:.1em}
        .det-brief{font-size:.65rem;color:var(--text2);margin-top:.2rem}
        .container{padding:1rem}
        .section{margin-bottom:1.5rem}
        .section-header{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
        .section-icon{width:6px;height:6px;background:var(--gold);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
        .section-title{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:500;color:var(--gold);letter-spacing:.15em;text-transform:uppercase}
        .section-count{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text3);margin-left:auto}
        .unit-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:1rem}
        .unit-card.attached{border-color:var(--gold-dark);box-shadow:inset 0 0 0 1px var(--border-gold)}
        .card-header{padding:.875rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(212,168,75,.05),transparent)}
        .unit-name{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:600;color:var(--text);letter-spacing:.03em}
        .unit-type{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}
        .unit-points{font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--gold);background:rgba(212,168,75,.1);padding:.25rem .6rem;border-radius:3px;white-space:nowrap}
        .attached-banner{background:linear-gradient(90deg,var(--gold-dark),transparent);padding:.5rem 1rem;display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--border-gold)}
        .attached-icon{width:14px;height:14px;border:2px solid var(--gold);border-radius:50%;position:relative}
        .attached-icon::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--gold);border-radius:50%}
        .attached-text{font-size:.7rem;color:var(--gold-bright);text-transform:uppercase;letter-spacing:.1em}
        .leader-bonus{background:linear-gradient(90deg,rgba(74,201,120,.1),transparent);border-left:3px solid var(--green);padding:.625rem .875rem;margin:.75rem;border-radius:0 4px 4px 0}
        .bonus-label{font-size:.6rem;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.2rem}
        .bonus-text{font-size:.8rem;color:var(--text);font-weight:500}
        .card-section{padding:.875rem 1rem;border-bottom:1px solid var(--border)}
        .card-section:last-child{border-bottom:none}
        .card-section.leader{background:linear-gradient(180deg,rgba(212,168,75,.03),transparent)}
        .sec-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.625rem;display:flex;align-items:center;gap:.4rem}
        .sec-label::before{content:'';width:10px;height:1px;background:var(--text3)}
        .stats-row{display:flex;gap:.35rem;margin-bottom:.875rem;flex-wrap:wrap}
        .stat{background:var(--bg2);padding:.35rem .5rem;border-radius:3px;text-align:center;min-width:42px;flex:1;max-width:60px}
        .stat-n{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
        .stat-v{font-family:'Share Tech Mono',monospace;font-size:.9rem;color:var(--text);font-weight:600}
        .stat.hl{background:rgba(212,168,75,.15);border:1px solid var(--border-gold)}
        .stat.hl .stat-v{color:var(--gold-bright)}
        .model-count{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text3);margin-bottom:.625rem}
        .model-count span{color:var(--text)}
        .invuln-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.875rem;padding:.4rem .6rem;background:rgba(212,168,75,.25);border:1px solid var(--border-gold);border-radius:3px;width:fit-content;cursor:pointer}
        .invuln-row.inherited{background:rgba(74,201,120,.25);border:2px dashed var(--green)}
        .invuln-label{font-size:.6rem;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
        .invuln-row.inherited .invuln-label{color:var(--text)}
        .invuln-val{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--text);font-weight:700}
        .invuln-row.inherited .invuln-val{color:var(--text)}
        .invuln-row.inherited::before{content:'';font-size:.7rem}
        .weapons{margin-bottom:.875rem}
        .weapon-category{background:var(--bg2);border-radius:4px;margin-bottom:.5rem;overflow:hidden}
        .weapon-category:last-child{margin-bottom:0}
        .weapon-category-header{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
        .weapon-category.ranged .weapon-category-header{background:rgba(74,142,212,.2);color:var(--blue);border-left:3px solid var(--blue)}
        .weapon-category.melee .weapon-category-header{background:rgba(201,68,68,.2);color:var(--red);border-left:3px solid var(--red)}
        .weapon-category-content{padding:.25rem .5rem}
        .weapon{padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
        .weapon:last-child{border-bottom:none}
        .weapon-group{position:relative;margin:.5rem 0;padding-left:1rem;border-left:3px solid var(--text3)}
        .weapon-group::before{content:'';position:absolute;left:-3px;top:0;width:8px;height:3px;background:var(--text3)}
        .weapon-group::after{content:'';position:absolute;left:-3px;bottom:0;width:8px;height:3px;background:var(--text3)}
        .weapon-group .weapon{border-bottom:1px dashed rgba(255,255,255,.1)}
        .weapon-group .weapon:last-child{border-bottom:none}
        .weapon-group-label{font-size:.5rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem;font-style:italic}
        .weapon-header{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.4rem}
        .weapon-name{color:var(--text);font-weight:500;font-size:.8rem}
        .wtype{font-size:.5rem;padding:.12rem .3rem;border-radius:2px;text-transform:uppercase;font-weight:700}
        .wtype.r{background:rgba(74,142,212,.3);color:var(--blue)}
        .wtype.m{background:rgba(201,68,68,.3);color:var(--red)}
        .weapon-stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-top:.35rem}
        .weapon-stats-grid.ranged{grid-template-columns:45px repeat(5,1fr)}
        .ws{background:var(--bg2);padding:.25rem .2rem;border-radius:2px;text-align:center}
        .ws-label{font-size:.90rem;color:var(--text3);text-transform:uppercase;letter-spacing:.02em;display:block}
        .ws-val{font-family:'Share Tech Mono',monospace;font-size:.75rem;color:var(--text);font-weight:600}
        .wabs{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem}
        .wab{font-size:.55rem;padding:.25rem .5rem;background:rgba(139,92,246,.35);color:var(--text);border-radius:2px;text-transform:uppercase;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;min-height:28px;display:inline-flex;align-items:center}
        .abilities{display:flex;flex-wrap:wrap;gap:.4rem}
        .ab{font-size:.65rem;padding:.5rem .7rem;background:rgba(139,92,246,.3);border:1px solid rgba(139,92,246,.4);color:var(--text);border-radius:3px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;user-select:none;touch-action:manipulation;min-height:36px;display:inline-flex;align-items:center}
        .ab.core{background:rgba(74,142,212,.3);border-color:rgba(74,142,212,.4);color:var(--text)}
        .ab.wg{background:rgba(212,168,75,.25);border-color:rgba(212,168,75,.4);color:var(--text)}
        .ab.inherited,.wab.inherited{background:rgba(74,201,120,.25);border:2px dashed var(--green);color:var(--text)}
        .ab.inherited::before,.wab.inherited::before{content:'🔗 '}
        .enh{display:inline-flex;align-items:center;gap:.3rem;font-size:.65rem;padding:.4rem .6rem;background:linear-gradient(90deg,rgba(212,168,75,.2),rgba(212,168,75,.1));border:1px solid var(--gold-dark);color:var(--gold-bright);border-radius:3px;margin-top:.5rem;cursor:pointer;touch-action:manipulation;min-height:36px}
        .enh::before{content:'★';font-size:.55rem}
        .total-wounds{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:rgba(74,201,120,.05);border-top:1px solid var(--border)}
        .tw-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
        .tw-val{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:var(--green);font-weight:600}
        .keywords{font-size:.6rem;color:var(--text3);padding:.625rem 1rem;background:var(--bg2);border-top:1px solid var(--border);line-height:1.5}
        #modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:none;justify-content:center;align-items:flex-end;padding:1rem}
        #modal.show{display:flex}
        .modal-content{background:var(--bg3);border:1px solid var(--border-gold);border-radius:12px 12px 0 0;width:100%;max-width:500px;max-height:70vh;overflow-y:auto}
        .modal-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg3)}
        .modal-title{font-family:'Orbitron',sans-serif;font-size:.9rem;color:var(--gold);letter-spacing:.05em}
        .modal-close{width:44px;height:44px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
        .modal-body{padding:1rem}
        .modal-type{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
        .modal-desc{font-size:.9rem;color:var(--text);line-height:1.7}
        .modal-desc strong{color:var(--gold-bright)}
        footer{text-align:center;padding:1.5rem 1rem;color:var(--text3);font-size:.65rem;border-top:1px solid var(--border)}
        .tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99}
        .tab{flex:1;padding:.875rem 1rem;font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;text-align:center;cursor:pointer;border:none;background:transparent;transition:all .2s ease;touch-action:manipulation;position:relative}
        .tab:hover{color:var(--text2);background:rgba(212,168,75,.05)}
        .tab.active{color:var(--gold);background:rgba(212,168,75,.1)}
        .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .char-list{display:flex;flex-direction:column;gap:.75rem}
        .char-toggle{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;touch-action:manipulation;transition:all .2s ease}
        .char-toggle:hover{border-color:var(--gold-dark)}
        .char-toggle.dead{opacity:.6;border-color:var(--red);background:rgba(201,68,68,.05)}
        .char-toggle.dead .char-status{background:var(--red);border-color:var(--red)}
        .char-toggle.dead .char-status::after{opacity:1}
        .char-status{width:24px;height:24px;border:2px solid var(--gold);border-radius:50%;position:relative;flex-shrink:0;transition:all .2s ease}
        .char-status::after{content:'';position:absolute;top:50%;left:50%;width:60%;height:3px;background:#fff;transform:translate(-50%,-50%) rotate(-45deg);opacity:0;transition:opacity .2s ease}
        .char-info{flex:1}
        .char-name{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--text);letter-spacing:.03em}
        .char-unit{font-size:.65rem;color:var(--text3);margin-top:.15rem}
        .char-label{font-size:.6rem;padding:.2rem .5rem;border-radius:2px;text-transform:uppercase;letter-spacing:.05em}
        .char-label.alive{background:rgba(74,201,120,.2);color:var(--green)}
        .char-label.dead{background:rgba(201,68,68,.2);color:var(--red)}
        .unit-card.leader-dead .leader-bonus{display:none}
        .unit-card.leader-dead .card-section.leader{opacity:.4;position:relative}
        .unit-card.leader-dead .card-section.leader::after{content:'SLAIN';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--red);opacity:.5;letter-spacing:.2em;pointer-events:none}
        .unit-card.leader-dead .inherited{display:none}
        .unit-card.leader-dead .invuln-row.inherited{display:none}
        .unit-card.leader-dead .attached-banner{background:linear-gradient(90deg,rgba(201,68,68,.3),transparent);border-color:var(--red)}
        .unit-card.leader-dead .attached-icon{border-color:var(--red)}
        .unit-card.leader-dead .attached-icon::after{background:var(--red)}
        .unit-card.leader-dead .attached-text{color:var(--red)}
        .loading{text-align:center;padding:2rem;color:var(--text2)}
        .model-profile-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:.75rem 0 .4rem;border-bottom:1px dashed var(--border);padding-bottom:.3rem}
        @media(min-width:768px){.container{max-width:800px;margin:0 auto;padding:1.5rem}#modal{align-items:center}.modal-content{border-radius:12px;max-height:60vh}}
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div><div class="logo-title">LEAGUES OF VOTANN</div><div class="logo-sub">LED UNITS REFERENCE</div></div>
            <div class="army-stats"><div class="stat-block"><div class="stat-value" id="unit-count">-</div><div class="stat-label">Units</div></div></div>
        </div>
        <div class="det-banner tappable" id="detachment-banner"><div class="det-name" id="detachment-name">Loading...</div><div class="det-brief">Tap for details</div></div>
    </header>
    <nav class="tabs">
        <button class="tab active" data-tab="units">Units</button>
        <button class="tab" data-tab="configuration">Configuration</button>
    </nav>
    <main class="container">
        <div id="units-tab" class="tab-content active">
            <section class="section">
                <div class="section-header"><div class="section-icon"></div><div class="section-title">Led Units</div><div class="section-count" id="led-units-count">-</div></div>
                <div id="units-container"><div class="loading">Loading units...</div></div>
            </section>
        </div>
        <div id="configuration-tab" class="tab-content">
            <section class="section">
                <div class="section-header"><div class="section-icon"></div><div class="section-title">Characters</div><div class="section-count" id="char-count">-</div></div>
                <p style="color:var(--text2);font-size:.75rem;margin-bottom:1rem;">Tap a character to mark them as slain. This will remove their buffs and abilities from attached units.</p>
                <div class="char-list" id="char-list"></div>
            </section>
        </div>
    </main>
    <footer>LEAGUES OF VOTANN — LED UNITS REFERENCE</footer>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header"><div class="modal-title" id="mtitle"></div><button class="modal-close" id="mclose">×</button></div>
            <div class="modal-body"><div class="modal-type" id="mtype"></div><div class="modal-desc" id="mdesc"></div></div>
        </div>
    </div>

    <script>
// Global data stores
let abilities = {};
let enhancements = {};
let army = {};
let units = {};
const characterState = {};

// DOM elements
const modal = document.getElementById('modal');
const mtitle = document.getElementById('mtitle');
const mtype = document.getElementById('mtype');
const mdesc = document.getElementById('mdesc');
const mclose = document.getElementById('mclose');

// Fetch JSON helper
async function fetchJSON(path) {
    const response = await fetch(path);
    if (!response.ok) throw new Error(`Failed to load ${path}`);
    return response.json();
}

// Load all data
async function loadData() {
    try {
        // Load core data files
        [abilities, enhancements, army] = await Promise.all([
            fetchJSON('data/abilities.json'),
            fetchJSON('data/enhancements.json'),
            fetchJSON('data/army.json')
        ]);

        // Collect unique unit IDs needed
        const unitIds = new Set();
        army.ledUnits.forEach(lu => {
            unitIds.add(lu.leader);
            unitIds.add(lu.bodyguard);
        });

        // Load all unit files
        const unitPromises = Array.from(unitIds).map(async id => {
            const unit = await fetchJSON(`data/units/${id}.json`);
            units[id] = unit;
        });
        await Promise.all(unitPromises);

        // Initialize character states
        army.ledUnits.forEach(lu => {
            characterState[lu.leader] = false;
        });

        // Render everything
        renderApp();
    } catch (error) {
        console.error('Failed to load data:', error);
        document.getElementById('units-container').innerHTML =
            `<div class="loading" style="color:var(--red)">Error loading data: ${error.message}</div>`;
    }
}

// Render the entire app
function renderApp() {
    // Update header
    document.getElementById('unit-count').textContent = army.totalUnits;
    document.getElementById('detachment-name').textContent =
        `${army.detachment.name} — ${abilities[army.detachment.rule]?.name || army.detachment.rule}`;
    document.getElementById('detachment-banner').setAttribute('data-ab', army.detachment.rule);
    document.getElementById('led-units-count').textContent = army.ledUnits.length;
    document.getElementById('char-count').textContent = army.ledUnits.length;

    // Render units
    renderUnits();

    // Render character toggles
    renderCharacterToggles();
}

// Render all unit cards
function renderUnits() {
    const container = document.getElementById('units-container');
    container.innerHTML = army.ledUnits.map(ledUnit => renderLedUnitCard(ledUnit)).join('');
}

// Render a single led unit card
function renderLedUnitCard(ledUnit) {
    const leader = units[ledUnit.leader];
    const bodyguard = units[ledUnit.bodyguard];
    const enhancement = ledUnit.enhancement ? enhancements[ledUnit.enhancement] : null;

    return `
        <div class="unit-card attached" data-leader="${ledUnit.leader}">
            <div class="attached-banner">
                <div class="attached-icon"></div>
                <div class="attached-text">${ledUnit.attachedBannerText}</div>
            </div>
            <div class="leader-bonus">
                <div class="bonus-label">Leader Bonus</div>
                <div class="bonus-text">${leader.leaderBonus.text}</div>
            </div>
            <div class="card-section leader">
                <div class="sec-label">Leader</div>
                ${renderUnitHeader(leader)}
                ${renderUnitStats(leader)}
                ${leader.invulnerableSave ? renderInvuln(leader.invulnerableSave, false) : ''}
                ${renderWeapons(leader.weapons, leader.leaderBonus?.grantsAbilities || [])}
                ${renderAbilities(leader, enhancement)}
            </div>
            <div class="card-section">
                <div class="sec-label">Bodyguard</div>
                ${renderUnitHeader(bodyguard)}
                ${renderUnitStats(bodyguard)}
                ${renderBodyguardInvuln(bodyguard, leader)}
                ${renderWeapons(bodyguard.weapons, leader.leaderBonus?.grantsAbilities || [], leader.leaderBonus?.appliesTo)}
                ${renderBodyguardAbilities(bodyguard, leader)}
            </div>
            <div class="total-wounds">
                <div class="tw-label">Total Wounds:</div>
                <div class="tw-val">${ledUnit.totalWounds} (${ledUnit.woundBreakdown})</div>
            </div>
            <div class="keywords">${ledUnit.combinedKeywords.join(', ')}</div>
        </div>
    `;
}

// Render unit header (name, type, points)
function renderUnitHeader(unit) {
    const modelText = unit.modelBreakdown
        ? `${unit.models} (${unit.modelBreakdown})`
        : unit.models;

    return `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem">
            <div>
                <div class="unit-name">${unit.name}</div>
                <div class="unit-type">${unit.type.join(' • ')}</div>
            </div>
            <div class="unit-points">${unit.points} pts</div>
        </div>
        <div class="model-count">Models: <span>${modelText}</span></div>
    `;
}

// Render unit stats
function renderUnitStats(unit) {
    // Check if unit has multiple model profiles
    if (unit.modelProfiles) {
        return unit.modelProfiles.map(profile => `
            <div class="model-profile-label">${profile.name}${profile.count > 1 ? ` (×${profile.count})` : ''}</div>
            ${renderStatsRow(profile.stats)}
        `).join('');
    }
    return renderStatsRow(unit.stats);
}

// Render a single stats row
function renderStatsRow(stats) {
    return `
        <div class="stats-row">
            <div class="stat"><div class="stat-n">M</div><div class="stat-v">${stats.m}</div></div>
            <div class="stat"><div class="stat-n">T</div><div class="stat-v">${stats.t}</div></div>
            <div class="stat"><div class="stat-n">Sv</div><div class="stat-v">${stats.sv}</div></div>
            <div class="stat hl"><div class="stat-n">W</div><div class="stat-v">${stats.w}</div></div>
            <div class="stat"><div class="stat-n">Ld</div><div class="stat-v">${stats.ld}</div></div>
            <div class="stat"><div class="stat-n">OC</div><div class="stat-v">${stats.oc}</div></div>
        </div>
    `;
}

// Render invulnerable save
function renderInvuln(value, inherited, source = null) {
    const classes = inherited ? 'invuln-row inherited tappable' : 'invuln-row tappable';
    const dataAb = source ? `data-ab="${source}"` : '';
    return `
        <div class="${classes}" ${dataAb}>
            <span class="invuln-label">Invulnerable Save:</span>
            <span class="invuln-val">${value}</span>
        </div>
    `;
}

// Render bodyguard invuln (check for inherited from leader)
function renderBodyguardInvuln(bodyguard, leader) {
    // Check if leader grants invuln
    const leaderGrantsInvuln = leader.leaderBonus?.grantsAbilities?.includes('invuln-5');

    if (leaderGrantsInvuln && !bodyguard.invulnerableSave) {
        return renderInvuln('5+', true, 'invuln-5');
    }

    if (bodyguard.invulnerableSave) {
        return renderInvuln(bodyguard.invulnerableSave, false, bodyguard.invulnerableSource);
    }

    return '';
}

// Render weapons section
function renderWeapons(weapons, inheritedAbilities = [], appliesTo = null) {
    const rangedHtml = weapons.ranged?.length ? renderWeaponCategory('ranged', weapons.ranged, inheritedAbilities, appliesTo) : '';
    const meleeHtml = weapons.melee?.length ? renderWeaponCategory('melee', weapons.melee, inheritedAbilities, appliesTo) : '';

    return `<div class="weapons">${rangedHtml}${meleeHtml}</div>`;
}

// Render a weapon category (ranged or melee)
function renderWeaponCategory(type, weaponList, inheritedAbilities, appliesTo) {
    const label = type === 'ranged' ? 'Ranged Weapons' : 'Melee Weapons';

    // Group weapons by weaponGroup
    const groups = {};
    const ungrouped = [];

    weaponList.forEach(weapon => {
        if (weapon.weaponGroup) {
            if (!groups[weapon.weaponGroup]) {
                groups[weapon.weaponGroup] = { label: weapon.weaponGroupLabel, weapons: [] };
            }
            groups[weapon.weaponGroup].weapons.push(weapon);
        } else {
            ungrouped.push(weapon);
        }
    });

    let contentHtml = '';

    // Render ungrouped weapons
    ungrouped.forEach(weapon => {
        contentHtml += renderWeapon(weapon, type, inheritedAbilities, appliesTo);
    });

    // Render grouped weapons
    Object.values(groups).forEach(group => {
        contentHtml += `
            <div class="weapon-group">
                <div class="weapon-group-label">${group.label}</div>
                ${group.weapons.map(w => renderWeapon(w, type, inheritedAbilities, appliesTo)).join('')}
            </div>
        `;
    });

    return `
        <div class="weapon-category ${type}">
            <div class="weapon-category-header">${label}</div>
            <div class="weapon-category-content">${contentHtml}</div>
        </div>
    `;
}

// Render a single weapon
function renderWeapon(weapon, type, inheritedAbilities, appliesTo) {
    const countText = weapon.count > 1 ? ` (×${weapon.count})` : '';
    const modelText = weapon.model ? ` (${weapon.model})` : '';
    const nameDisplay = weapon.name + countText + modelText;

    // Determine which inherited abilities apply
    let applicableInherited = [];
    if (appliesTo === null || appliesTo === type) {
        // Check weapon's own inherited abilities first
        applicableInherited = weapon.inheritedAbilities || [];
        // Then add global inherited abilities if not already present
        inheritedAbilities.forEach(ab => {
            if (!applicableInherited.includes(ab)) {
                applicableInherited.push(ab);
            }
        });
    } else {
        // Only use weapon's own inherited abilities
        applicableInherited = weapon.inheritedAbilities || [];
    }

    const statsGrid = type === 'ranged'
        ? `<div class="weapon-stats-grid ranged">
            <div class="ws"><span class="ws-label">Rng</span><span class="ws-val">${weapon.range}</span></div>
            <div class="ws"><span class="ws-label">A</span><span class="ws-val">${weapon.a}</span></div>
            <div class="ws"><span class="ws-label">BS</span><span class="ws-val">${weapon.bs}</span></div>
            <div class="ws"><span class="ws-label">S</span><span class="ws-val">${weapon.s}</span></div>
            <div class="ws"><span class="ws-label">AP</span><span class="ws-val">${weapon.ap}</span></div>
            <div class="ws"><span class="ws-label">D</span><span class="ws-val">${weapon.d}</span></div>
           </div>`
        : `<div class="weapon-stats-grid">
            <div class="ws"><span class="ws-label">A</span><span class="ws-val">${weapon.a}</span></div>
            <div class="ws"><span class="ws-label">WS</span><span class="ws-val">${weapon.ws}</span></div>
            <div class="ws"><span class="ws-label">S</span><span class="ws-val">${weapon.s}</span></div>
            <div class="ws"><span class="ws-label">AP</span><span class="ws-val">${weapon.ap}</span></div>
            <div class="ws"><span class="ws-label">D</span><span class="ws-val">${weapon.d}</span></div>
           </div>`;

    // Render weapon abilities
    const allAbilities = [
        ...(weapon.abilities || []).map(ab => ({ id: ab, inherited: false })),
        ...applicableInherited.map(ab => ({ id: ab, inherited: true }))
    ];

    const abilitiesHtml = allAbilities.length ? `
        <div class="wabs">
            ${allAbilities.map(ab => {
                const abData = abilities[ab.id];
                const displayName = abData?.name || ab.id;
                const classes = ab.inherited ? 'wab inherited tappable' : 'wab tappable';
                return `<button class="${classes}" data-ab="${ab.id}">${displayName}</button>`;
            }).join('')}
        </div>
    ` : '';

    return `
        <div class="weapon">
            <div class="weapon-header"><span class="weapon-name">${nameDisplay}</span></div>
            ${statsGrid}
            ${abilitiesHtml}
        </div>
    `;
}

// Render leader abilities
function renderAbilities(unit, enhancement) {
    let html = '<div class="abilities">';

    // Wargear abilities
    (unit.wargear || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab wg tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Regular abilities
    (unit.abilities || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    html += '</div>';

    // Enhancement
    if (enhancement) {
        const enhKey = Object.keys(enhancements).find(k => enhancements[k] === enhancement);
        html += `<div class="enh tappable" data-ab="${enhKey}">${enhancement.name}</div>`;
    }

    return html;
}

// Render bodyguard abilities (with inherited)
function renderBodyguardAbilities(bodyguard, leader) {
    let html = '<div class="abilities">';

    // Core abilities
    (bodyguard.coreAbilities || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab core tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Wargear abilities
    (bodyguard.wargear || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab wg tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Regular abilities
    (bodyguard.abilities || []).forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    // Inherited abilities from leader (like Deep Strike)
    const inheritedDisplayAbilities = (leader.leaderBonus?.grantsAbilities || [])
        .filter(ab => ab === 'deep-strike'); // Only show certain inherited abilities as tags

    inheritedDisplayAbilities.forEach(ab => {
        const abData = abilities[ab];
        html += `<span class="ab inherited tappable" data-ab="${ab}">${abData?.name || ab}</span>`;
    });

    html += '</div>';
    return html;
}

// Render character toggles in configuration tab
function renderCharacterToggles() {
    const container = document.getElementById('char-list');
    container.innerHTML = army.ledUnits.map(ledUnit => {
        const leader = units[ledUnit.leader];
        const bodyguard = units[ledUnit.bodyguard];
        return `
            <div class="char-toggle" data-char="${ledUnit.leader}">
                <div class="char-status"></div>
                <div class="char-info">
                    <div class="char-name">${leader.name}</div>
                    <div class="char-unit">Leading ${bodyguard.name}</div>
                </div>
                <span class="char-label alive">Alive</span>
            </div>
        `;
    }).join('');

    // Attach event listeners
    document.querySelectorAll('.char-toggle').forEach(toggle => {
        toggle.addEventListener('click', function() {
            const charId = this.getAttribute('data-char');
            characterState[charId] = !characterState[charId];
            updateCharToggle(this, characterState[charId]);
            updateUnitCard(charId, characterState[charId]);
        });
    });
}

// Update unit card when leader dies
function updateUnitCard(charId, isDead) {
    const unitCard = document.querySelector(`.unit-card[data-leader="${charId}"]`);
    if (unitCard) {
        if (isDead) {
            unitCard.classList.add('leader-dead');
        } else {
            unitCard.classList.remove('leader-dead');
        }
    }
}

// Update character toggle UI
function updateCharToggle(toggle, isDead) {
    const label = toggle.querySelector('.char-label');
    if (isDead) {
        toggle.classList.add('dead');
        label.textContent = 'Slain';
        label.classList.remove('alive');
        label.classList.add('dead');
    } else {
        toggle.classList.remove('dead');
        label.textContent = 'Alive';
        label.classList.remove('dead');
        label.classList.add('alive');
    }
}

// Modal functions
function showModal(id) {
    // Check abilities first, then enhancements
    const a = abilities[id] || enhancements[id];
    if (!a) return;
    mtitle.textContent = a.name;
    mtype.textContent = a.type;
    mdesc.innerHTML = a.description;
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
}

function hideModal() {
    modal.classList.remove('show');
    document.body.style.overflow = '';
}

// Event listeners
document.addEventListener('click', function(e) {
    const target = e.target.closest('[data-ab]');
    if (target) {
        e.preventDefault();
        showModal(target.getAttribute('data-ab'));
    }
});

mclose.addEventListener('click', hideModal);
modal.addEventListener('click', function(e) {
    if (e.target === modal) hideModal();
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideModal();
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
        const tabId = this.getAttribute('data-tab');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
    });
});

// Initialize app
loadData();
    </script>
</body>
